<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline - DermaGlow</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: #fbf6f0;
        color: #2b2622;
        text-align: center;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #141110; color: #f1e8dd; }
      }
      .mark {
        width: 56px; height: 56px; border-radius: 18px;
        display: grid; place-items: center; margin: 0 auto 1.5rem;
        background: #2f5d50; color: #fbf6f0; font-size: 26px;
      }
      h1 { font-size: 1.5rem; margin: 0 0 .5rem; }
      p { margin: 0; opacity: .7; max-width: 22rem; line-height: 1.6; }
      button {
        margin-top: 1.75rem; border: 0; cursor: pointer;
        padding: .8rem 1.5rem; border-radius: 999px;
        background: #2f5d50; color: #fbf6f0; font-size: .95rem; font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="mark">◍</div>
      <h1>You are offline</h1>
      <p>DermaGlow needs a connection to analyze your skin. Please reconnect and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
